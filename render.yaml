services:
  # ─── Backend: FastAPI Web Service ────────────────────────────────────────────
  - type: web
    name: niro-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # ── REQUIRED – server will not start without these ──────────────────────
      - key: MONGO_URL
        sync: false        # MongoDB Atlas connection string (mongodb+srv://...)
      - key: DB_NAME
        value: niro_db
      - key: GEMINI_API_KEY
        sync: false        # Required – backend crashes at startup without this
      # ── OPTIONAL – only needed when those features are used ─────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: "*"

  # ─── Frontend: React Static Site ─────────────────────────────────────────────
  - type: web
    name: niro-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    envVars:
      # Set this to your niro-backend Render URL after first backend deploy
      # e.g. https://niro-backend.onrender.com
      - key: REACT_APP_BACKEND_URL
        sync: false
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
